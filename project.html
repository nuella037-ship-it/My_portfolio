<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>John Doe | Projects</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>

    <!-- HEADER -->
    <header class="header">
        <div class="container">
            <a href="index.html" class="logo">JD<span>.</span></a>
            <nav class="nav-links" id="navLinks">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="projects.html" class="active">Projects</a>
                <a href="contact.html">Contact</a>
            </nav>
            <div style="display:flex;align-items:center;gap:6px;">
                <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
                <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
            </div>
        </div>
    </header>

    <!-- PROJECTS PAGE -->
    <section style="padding:calc(var(--header-height) + 40px) 0 60px;">
        <div class="container">
            <div class="section-header center">
                <div class="section-label">Portfolio</div>
                <h2 class="section-title">My <span class="highlight">Projects</span></h2>
                <p class="section-desc">A complete collection of my work across different technologies and industries.</p>
            </div>

            <!-- Filters -->
            <div class="project-filters" id="projectFilters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="web">Web Apps</button>
                <button class="filter-btn" data-filter="mobile">Mobile</button>
                <button class="filter-btn" data-filter="design">Design</button>
                <button class="filter-btn" data-filter="ai">AI/ML</button>
            </div>

            <div class="projects-grid" id="projectsGrid">
                <!-- Injected via JS -->
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="container">
            <div class="copy">&copy; 2026 John Doe. Built with <i class="fas fa-heart" style="color:var(--accent);"></i></div>
            <div class="social-links">
                <a href="#"><i class="fab fa-github"></i></a>
                <a href="#"><i class="fab fa-linkedin-in"></i></a>
                <a href="#"><i class="fab fa-twitter"></i></a>
                <a href="#"><i class="fab fa-youtube"></i></a>
            </div>
        </div>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
